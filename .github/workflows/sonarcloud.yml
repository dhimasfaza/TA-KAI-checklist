name: SonarCloud Analysis

on:
push:
branches:
- main

pull_request:
branches:
- main

schedule:
- cron: '*/5 * * * *'

workflow_dispatch:

permissions:
contents: read
pull-requests: read

jobs:
sonarcloud:
name: SonarCloud Scan
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: SonarCloud Scan
    uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      args: >
        -Dsonar.projectKey=dhimasfaza_TA-KAI-checklist
        -Dsonar.organization=ta-faza
```
